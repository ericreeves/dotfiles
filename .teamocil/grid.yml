session:
  name: "grid"
  windows:
    - name: "iops"
      root: "~"
      layout: even-vertical
      panes:
        - cmd: "date"
        - cmd: "w"
    - name: "alwatch"
      root: "~"
      layout: even-vertical
      panes:
        - cmd: "/var/alertlogic/bin/alwatch.sh"
        - cmd: "/var/alertlogic/bin/ssdlwatch.sh"
    - name: "logs-pri"
      root: "~"
      layout: even-vertical
      panes:
        - cmd: "tail -f /var/log/apps/lm2/primary-warn.log"
        - cmd: "tail -f /var/log/apps/lm2/primary.log"
    - name: "cntl-pri"
      root: "~"
      layout: even-vertical
      panes:
        - cmd: "ssh root@den-cntl-pri-01"
        - cmd: "ssh root@den-cntl-pri-02"
    - name: "node-pri"
      root: "~"
      layout: even-vertical
      panes:
        - cmd: "pdsh -g lm2-primary-node hostname"
        - cmd: "ssh root@den-node-pri-01"
    - name: "logs-rep"
      root: "~"
      layout: even-vertical
      panes:
        - cmd: "tail -f /var/log/apps/lm2/report-warn.log"
        - cmd: "tail -f /var/log/apps/lm2/report.log"
    - name: "cntl-rep"
      root: "~"
      layout: even-vertical
      panes:
        - cmd: "ssh root@den-cntl-rep-01"
        - cmd: "ssh root@den-cntl-rep-02"
    - name: "node-rep"
      root: "~"
      layout: even-vertical
      panes:
        - cmd: "pdsh -g lm2-report-node hostname"
        - cmd: "ssh root@den-node-rep-01"
