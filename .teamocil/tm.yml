session:
  name: "tm"
  windows:
    - name: "iops"
      root: "~"
      layout: even-vertical
      panes:
        - cmd: "date"
        - cmd: "w"
    - name: "alwatch"
      root: "~"
      layout: even-vertical
      panes:
        - cmd: "/var/alertlogic/bin/alwatch.sh"
        - cmd: "/var/alertlogic/bin/ssdlwatch.sh"
    - name: "db-alpha"
      root: "~"
      layout: even-vertical
      panes:
        - cmd: "myt db-alpha-master"
        - cmd: "ssh root@db-alpha-master"
    - name: "alreceiver"
      root: "~"
      clear: true
      options:
        synchronize-panes: true
      layout: even-vertical
      panes:
        - cmd: "ssh root@den-receiver-03"
        - cmd: "ssh root@den-receiver-04"
        - cmd: "ssh root@den-receiver-05"
    - name: "db-tmqueue"
      root: "~"
      layout: even-vertical
      panes:
        - cmd: "myt db-tmqueue-master"
        - cmd: "ssh root@db-tmqueue-master"
    - name: "alqueue"
      root: "~"
      clear: true
      options:
        synchronize-panes: true
      layout: even-vertical
      panes:
        - cmd: "ssh root@den-queue-01"
        - cmd: "ssh root@den-queue-02"
        - cmd: "ssh root@den-queue-03"
    - name: "db-payload"
      root: "~"
      layout: even-vertical
      panes:
