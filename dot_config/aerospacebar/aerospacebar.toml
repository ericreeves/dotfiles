# AeroSpaceBar Configuration File
# This file stores all your settings in TOML format.
# Changes are automatically saved when modified through the UI.
# You can edit this file directly - changes will be reflected immediately.

[advanced]
enable-optimized-performance = true
enable-performance-metrics = false
focus-window-on-click = false
# Supported values: "debug", "info", "warning", "error", "fault"
log-level = 'info'

[general]
aerospace-path = '/opt/homebrew/bin/aerospace'
quick-hide-enabled = true
quick-hide-trigger-key = 'control'
show-window-titles = true
theme-mode = 'custom'
theme-preset = 'catppuccin-mocha'

[general.theme-preset-effect]
background-blur-radius = 0.80000000000000004
background-opacity = 0.80000000000000004
border-opacity = 0.80000000000000004

[general.theme-preset-geometric]
border-width = 2.0
corner-radius = 14.0

[groups]
# Groups appearance mode: appearance-mode = <value>
# Supported values: "per-group", "all-groups", "match-spaces"
appearance-mode = 'match-spaces'
show-groups = false

[groups.global-effect-config]
background-blur-radius = 0.0
background-opacity = 0.20000000000000001
border-opacity = 0.80000000000000004

[groups.global-geometric-config]
border-width = 0.0
corner-radius = 14.0

[groups.global-visual-config.background-tint-color]
alpha = 1.0
blue = 1.0
green = 1.0
red = 1.0

