#######################################################
# tmux.conf — keybindings aligned with AeroSpace
#
# AeroSpace heuristics this mirrors:
#   alt+hjkl            focus              → prefix+hjkl
#   alt+shift+hjkl      move window        → prefix+H/J/K/L   (swap-pane)
#   ctrl+alt+hjkl       resize             → prefix+arrows (repeatable)
#   alt+u / alt+i       stack cycle        → prefix+u / prefix+i   (prev/next window)
#   alt+y / alt+o       prev/next ws       → prefix+y / prefix+o   (swap-window ±1)
#   alt+, / alt+.       focus cycle        → prefix+, / prefix+.   (prev/next layout)
#   alt+m               fullscreen         → prefix+m              (zoom pane)
#   alt+f               float              → prefix+f              (tmux-floax popup)
#   alt+tab             back-and-forth     → prefix+Tab            (last-window)
#   alt+1..9            workspace N        → prefix+1..9           (window N)
#######################################################

# Prefix = Ctrl+W
set -g prefix C-w
unbind-key C-b
bind-key C-w send-prefix

# General
set -sg escape-time 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set -g detach-on-destroy off
set -g renumber-windows on
set -g focus-events on
set -g history-limit 10000
setw -g mouse on
set -g set-titles off

# Terminal / colors
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"

# macOS ships bash 3.2 (no associative arrays), which breaks tmux2k's plugin
# color table — every lookup collapses to the last entry ("red text"). Prepend
# Homebrew's bash 5 so plugin scripts' `#!/usr/bin/env bash` resolves correctly.
if-shell '[ -x /opt/homebrew/bin/bash ]' \
  'run-shell "tmux set-environment -g PATH /opt/homebrew/bin:$PATH"'

# vi-mode
set -g status-keys vi
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'V' send -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Reload config
bind   r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"
bind C-r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

#######################################################
# Pane bindings (AeroSpace-aligned)
#######################################################

# Every letter binding below has a C-<letter> parallel so you can hold Ctrl
# through the whole prefix→command sequence. Exceptions:
#   C-m = Enter, C-i = Tab at the terminal level → no ctrl form for m / i
#   C-H/J/K/L can't be distinguished from C-h/j/k/l → no ctrl form for swap
#   C-<digit>, C-<punct> unreliable across terminals → plain form only

# Focus pane (alt+hjkl)
bind   h select-pane -L
bind C-h select-pane -L
bind   j select-pane -D
bind C-j select-pane -D
bind   k select-pane -U
bind C-k select-pane -U
bind   l select-pane -R
bind C-l select-pane -R

# Swap pane in direction (alt+shift+hjkl)
bind H swap-pane -d -t '{left-of}'
bind J swap-pane -d -t '{down-of}'
bind K swap-pane -d -t '{up-of}'
bind L swap-pane -d -t '{right-of}'

# Resize pane (moved to arrows, repeatable — frees C-hjkl for focus parallels)
bind -r Left  resize-pane -L 4
bind -r Down  resize-pane -D 4
bind -r Up    resize-pane -U 4
bind -r Right resize-pane -R 4

# Zoom pane (alt+m fullscreen) — no ctrl parallel (C-m = Enter)
bind m resize-pane -Z

# Splits (matches ghostty ctrl+\ / ctrl+/)
bind \\ split-window -h -c "#{pane_current_path}"
bind /  split-window -v -c "#{pane_current_path}"

# Kill pane
bind   q kill-pane
bind C-q kill-pane

# Sync panes
bind   a setw synchronize-panes
bind C-a setw synchronize-panes

# Copy / paste
bind   g copy-mode
bind C-g copy-mode
bind   v paste-buffer
bind C-v paste-buffer

# Pane title
bind P command-prompt -p "New title:" 'select-pane -T "%%"'

#######################################################
# Window bindings (AeroSpace workspace analogs)
#######################################################

# New window
bind   n new-window -c "#{pane_current_path}"
bind C-n new-window -c "#{pane_current_path}"

# Prev/next window (prefix+u / prefix+i) — no ctrl form for i (C-i = Tab)
bind   u previous-window
bind C-u previous-window
bind   i next-window

# Swap window left/right (prefix+y / prefix+o)
bind   y swap-window -t -1 \; previous-window
bind C-y swap-window -t -1 \; previous-window
bind   o swap-window -t +1 \; next-window
bind C-o swap-window -t +1 \; next-window

# Layout cycle (alt+, / alt+.)
bind , previous-layout
bind . next-layout

# Back-and-forth (alt+tab)
bind Tab last-window

# Rename window / session
bind T command-prompt -I "#W" "rename-window '%%'"
bind S command-prompt -I "#S" "rename-session '%%'"

# Window quick keys (left-hand bottom row: z=1 x=2 c=3 [v=paste] b=5)
bind   z select-window -t 1
bind C-z select-window -t 1
bind   x select-window -t 2
bind C-x select-window -t 2
bind   c select-window -t 3
bind C-c select-window -t 3
bind   b select-window -t 5
bind C-b select-window -t 5

# Window by number (alt+1..9)
bind 1 select-window -t 1
bind 2 select-window -t 2
bind 3 select-window -t 3
bind 4 select-window -t 4
bind 5 select-window -t 5
bind 6 select-window -t 6
bind 7 select-window -t 7
bind 8 select-window -t 8
bind 9 select-window -t 9
bind 0 select-window -t 10

#######################################################
# Session bindings
#######################################################

# Session switcher (sesh + gum)
bind   t display-popup -E -w 40% "sesh connect \"$(
 sesh list -i | gum filter --limit 1 --no-sort --fuzzy --placeholder 'Pick a sesh' --height 50 --prompt='⚡'
)\""
bind C-t display-popup -E -w 40% "sesh connect \"$(
 sesh list -i | gum filter --limit 1 --no-sort --fuzzy --placeholder 'Pick a sesh' --height 50 --prompt='⚡'
)\""

#######################################################
# Pane borders
#######################################################
set -g pane-border-status top
set -g pane-border-format '#{pane_index} "#{pane_title}"'

#######################################################
# Theme (Catppuccin Mocha via tmux2k)
#######################################################
set -g @catppuccin_flavour 'mocha'

set -g @tmux2k-theme 'catppuccin'
set -g @tmux2k-icons-only false

set -g @tmux2k-black '#1e1e2e'
set -g @tmux2k-gray '#45475a'
set -g @tmux2k-white '#cdd6f4'
set -g @tmux2k-light-blue '#89dceb'
set -g @tmux2k-blue '#89b4fa'
set -g @tmux2k-dark-blue '#526c96'
set -g @tmux2k-light-green '#94e2d5'
set -g @tmux2k-green '#a6e3a1'
set -g @tmux2k-dark-green '#638861'
set -g @tmux2k-light-orange '#fab387'
set -g @tmux2k-yellow '#fab387'
set -g @tmux2k-dark-orange '#966b51'
set -g @tmux2k-light-pink '#f5e0dc'
set -g @tmux2k-light-purple '#cba6f7'
set -g @tmux2k-dark-pink '#93748b'
set -g @tmux2k-purple '#b4befe'
set -g @tmux2k-dark-purple '#6c7298'
set -g @tmux2k-light-red '#eba0ac'
set -g @tmux2k-red '#f38ba8'
set -g @tmux2k-dark-red '#925365'
set -g @tmux2k-light-yellow '#f9e2af'
set -g @tmux2k-dark-yellow '#958869'

set -g @tmux2k-left-plugins "session cwd"
set -g @tmux2k-right-plugins "docker cpu ram"
set -g @tmux2k-refresh-rate 5

#######################################################
# tmux-floax (alt+f float analog — popup pane)
#######################################################
set -g @floax-bind 'f'

#######################################################
# Plugins (tpm)
#######################################################
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin '2kabhishek/tmux2k'
set -g @plugin 'omerxx/tmux-floax'
set -g @plugin 'tmux-plugins/tmux-cpu'

run '~/.config/tmux/plugins/tpm/tpm'

# Ctrl parallel for floax (plugin only takes one bind; add after tpm loads)
bind C-f run-shell "~/.config/tmux/plugins/tmux-floax/floax.sh"
