config-version = 2

after-startup-command = [
    'exec-and-forget /bin/bash -c "$HOME/.config/aerospace/borders/bordersrc"',
]

# Update borders + auto-center single windows on workspace change
exec-on-workspace-change = ['/bin/bash', '-c',
    '$HOME/.config/aerospace/scripts/border_update.sh; $HOME/.config/aerospace/scripts/dynamic_gaps.sh'
]

# Update borders + retile check on focus change
on-focus-changed = [
    'exec-and-forget /bin/bash -c "$HOME/.config/aerospace/scripts/border_update.sh; $HOME/.config/aerospace/scripts/dynamic_gaps_retile.sh"',
    'exec-and-forget osascript -e " tell application \"System Events\" to     if (get name of every process) contains \"AeroSpaceBar\" then         tell application \"AeroSpaceBar\" to «event ascrpsbr» \"updateOnFocusChanged\" "'
]

start-at-login = false

# Normalizations
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# Layout
accordion-padding = 30
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

# Mouse follows focus on monitor change
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

automatically-unhide-macos-hidden-apps = false

# Workspaces 1-9 only
persistent-workspaces = ['1', '2', '3', '4', '5', '6', '7', '8', '9']

on-mode-changed = []

[key-mapping]
    preset = 'qwerty'

# Gaps (matching komorebi 15px padding)
[gaps]
    inner.horizontal = 15
    inner.vertical = 15
    outer.left = 15
    outer.bottom = 15
    outer.top = [{ monitor.'main' = 40 }, 15]
    outer.right = 15

# Workspace-to-monitor assignment
[workspace-to-monitor-force-assignment]
    1 = 'main'
    2 = 'main'
    3 = 'main'
    4 = 'main'
    5 = 'main'
    6 = 'secondary'
    7 = 'secondary'
    8 = 'secondary'
    9 = 'secondary'

# -------------------------------------------------------------------
# Floating app rules
# -------------------------------------------------------------------

[[on-window-detected]]
if.app-name-regex-substring = '1Password'
run = 'layout floating'

[[on-window-detected]]
if.app-name-regex-substring = 'Microsoft Teams'
run = 'layout floating'

[[on-window-detected]]
if.app-name-regex-substring = 'Wispr Flow'
run = 'layout floating'

[[on-window-detected]]
if.app-name-regex-substring = 'Logi Options'
run = 'layout floating'

[[on-window-detected]]
if.app-name-regex-substring = 'iPhone Mirroring'
run = 'layout floating'

[[on-window-detected]]
if.app-name-regex-substring = 'Claude'
run = 'layout floating'

[[on-window-detected]]
if.app-name-regex-substring = 'Cisco Secure Client'
run = 'layout floating'

[[on-window-detected]]
if.app-name-regex-substring = 'Stream Deck'
run = 'layout floating'

[[on-window-detected]]
if.app-name-regex-substring = 'zoom.us'
run = 'layout floating'

[[on-window-detected]]
if.app-name-regex-substring = 'meetily'
run = 'layout floating'

# -------------------------------------------------------------------
# Main keybindings
# -------------------------------------------------------------------

[mode.main.binding]

    # Focus (alt+hjkl) — crosses monitor boundaries
    alt-h = 'focus --boundaries all-monitors-outer-frame left'
    alt-j = 'focus --boundaries all-monitors-outer-frame down'
    alt-k = 'focus --boundaries all-monitors-outer-frame up'
    alt-l = 'focus --boundaries all-monitors-outer-frame right'

    # Move (alt+shift+hjkl)
    alt-shift-h = 'move left'
    alt-shift-j = 'move down'
    alt-shift-k = 'move up'
    alt-shift-l = 'move right'

    # Resize (ctrl+alt+hjkl)
    ctrl-alt-l = 'resize smart +50'
    ctrl-alt-h = 'resize smart -50'
    ctrl-alt-k = 'resize smart +50'
    ctrl-alt-j = 'resize smart -50'

    # Fullscreen / monocle toggle
    alt-m = 'fullscreen'

    # Retile / flatten
    alt-r = 'flatten-workspace-tree'

    # Cycle focus through windows
    alt-comma = 'focus --boundaries-action wrap-around-the-workspace left'
    alt-period = 'focus --boundaries-action wrap-around-the-workspace right'

    # Cycle layout
    alt-shift-comma = 'layout tiles horizontal vertical'
    alt-shift-period = 'layout accordion horizontal vertical'

    # Monitor focus / move
    alt-slash = 'focus-monitor --wrap-around next'
    alt-shift-slash = ['move-node-to-monitor --wrap-around next', 'focus-monitor --wrap-around next']

    # Reload config
    alt-cmd-r = 'reload-config'

    # Workspace cycling
    alt-y = 'workspace --wrap-around prev'
    alt-o = 'workspace --wrap-around next'
    alt-shift-y = 'move-node-to-workspace --focus-follows-window --wrap-around prev'
    alt-shift-o = 'move-node-to-workspace --focus-follows-window --wrap-around next'

    # Stack cycling (accordion = aerospace's stacking)
    alt-u = 'focus dfs-prev'
    alt-i = 'focus dfs-next'
    alt-shift-u = 'join-with left'
    alt-shift-i = 'join-with right'

    # Back and forth
    alt-tab = 'workspace-back-and-forth'
    alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

    # Position mode (float + snap to left/center/right on G9)
    alt-shift-quote = 'mode position'

    # Service mode
    alt-shift-semicolon = 'mode service'

    # Workspaces
    alt-1 = 'workspace 1'
    alt-2 = 'workspace 2'
    alt-3 = 'workspace 3'
    alt-4 = 'workspace 4'
    alt-5 = 'workspace 5'
    alt-6 = 'workspace 6'
    alt-7 = 'workspace 7'
    alt-8 = 'workspace 8'
    alt-9 = 'workspace 9'

    # Move to workspace (focus follows window)
    alt-shift-1 = 'move-node-to-workspace --focus-follows-window 1'
    alt-shift-2 = 'move-node-to-workspace --focus-follows-window 2'
    alt-shift-3 = 'move-node-to-workspace --focus-follows-window 3'
    alt-shift-4 = 'move-node-to-workspace --focus-follows-window 4'
    alt-shift-5 = 'move-node-to-workspace --focus-follows-window 5'
    alt-shift-6 = 'move-node-to-workspace --focus-follows-window 6'
    alt-shift-7 = 'move-node-to-workspace --focus-follows-window 7'
    alt-shift-8 = 'move-node-to-workspace --focus-follows-window 8'
    alt-shift-9 = 'move-node-to-workspace --focus-follows-window 9'

# -------------------------------------------------------------------
# Service mode
# -------------------------------------------------------------------

[mode.service.binding]
    esc = ['reload-config', 'mode main']
    r = ['flatten-workspace-tree', 'mode main']
    f = ['layout floating tiling', 'mode main']
    backspace = ['close-all-windows-but-current', 'mode main']

    alt-shift-h = ['join-with left', 'mode main']
    alt-shift-j = ['join-with down', 'mode main']
    alt-shift-k = ['join-with up', 'mode main']
    alt-shift-l = ['join-with right', 'mode main']

# -------------------------------------------------------------------
# Position mode — float + snap window on G9 ultrawide
# -------------------------------------------------------------------

[mode.position.binding]
    esc = 'mode main'
    h = ['exec-and-forget $HOME/.config/aerospace/scripts/window_position.sh left', 'mode main']
    l = ['exec-and-forget $HOME/.config/aerospace/scripts/window_position.sh right', 'mode main']
    k = ['exec-and-forget $HOME/.config/aerospace/scripts/window_position.sh center', 'mode main']
    # Re-tile the window (exit floating)
    j = ['layout tiling', 'mode main']
