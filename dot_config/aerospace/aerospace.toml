config-version = 2

after-startup-command = [
    'exec-and-forget bash -c "$HOME/.config/aerospace/borders/bordersrc"',
    'exec-and-forget bash -c "sketchybar --config $HOME/.config/aerospace/sketchybar/sketchybarrc"',
    'exec-and-forget bash -c "aerospace-helper & sleep 1 && aero-notify workspace_changed"',
]

# Send events to the Rust helper daemon
exec-on-workspace-change = ['/bin/bash', '-c',
    'aero-notify "workspace_changed:$AEROSPACE_FOCUSED_WORKSPACE"'
]

on-focus-changed = [
    'exec-and-forget bash -c "aero-notify focus_changed"',
]

start-at-login = false

# Normalizations
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# Layout
accordion-padding = 50
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

# Mouse follows focus on monitor change
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

automatically-unhide-macos-hidden-apps = false

# Workspaces 1-9 only
persistent-workspaces = ['1', '2', '3', '4', '5', '6', '7', '8', '9']

on-mode-changed = []

# Ensure homebrew and local bins are in PATH for all exec commands
[exec.env-vars]
PATH = '/opt/homebrew/bin:/Users/eric/.local/bin:${PATH}'

[key-mapping]
    preset = 'qwerty'

# Gaps (matching komorebi 15px padding)
[gaps]
    inner.horizontal = 15
    inner.vertical = 15
    outer.left = 15
    outer.bottom = 15
    outer.top = [{ monitor.'main' = 50 }, 70]
    outer.right = 15

# Workspace-to-monitor assignment
[workspace-to-monitor-force-assignment]
    1 = 'main'
    2 = 'main'
    3 = 'main'
    4 = 'main'
    5 = 'main'
    6 = 'secondary'
    7 = 'secondary'
    8 = 'secondary'
    9 = 'secondary'

